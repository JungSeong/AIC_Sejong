# Experiment scenarios for comparing port_entrance ground truth XYZ against FinalPolicy multi-camera triangulation XYZ.
#
# Run example:
# distrobox enter -r aic_eval -- /entrypoint.sh \
#   ground_truth:=true \
#   start_aic_engine:=true \
#   gazebo_gui:=true \
#   rviz_gui:=true \
#   spawn_task_board:=false \
#   spawn_cable:=false \
#   aic_engine_config_file:=/home/swlinux/Desktop/workspace/AIC_Sejong/triangulation/triangulation_cases.yaml
#
# Ground-truth entrance frames:
# - SFP: task_board/nic_card_mount_N/sfp_port_{0,1}_link_entrance
# - SC:  task_board/sc_port_N/sc_port_base_link_entrance

scoring:
  topics:
    - topic:
        name: "/joint_states"
        type: "sensor_msgs/msg/JointState"
    - topic:
        name: "/tf"
        type: "tf2_msgs/msg/TFMessage"
    - topic:
        name: "/tf_static"
        type: "tf2_msgs/msg/TFMessage"
        latched: true
    - topic:
        name: "/scoring/tf"
        type: "tf2_msgs/msg/TFMessage"
    - topic:
        name: "/aic/gazebo/contacts/off_limit"
        type: "ros_gz_interfaces/msg/Contacts"
    - topic:
        name: "/fts_broadcaster/wrench"
        type: "geometry_msgs/msg/WrenchStamped"
    - topic:
        name: "/aic_controller/joint_commands"
        type: "aic_control_interfaces/msg/JointMotionUpdate"
    - topic:
        name: "/aic_controller/pose_commands"
        type: "aic_control_interfaces/msg/MotionUpdate"
    - topic:
        name: "/scoring/insertion_event"
        type: "std_msgs/msg/String"
    - topic:
        name: "/aic_controller/controller_state"
        type: "aic_control_interfaces/msg/ControllerState"

task_board_limits:
  nic_rail:
    min_translation: -0.0215
    max_translation: 0.0234
  sc_rail:
    min_translation: -0.06
    max_translation: 0.055
  mount_rail:
    min_translation: -0.09425
    max_translation: 0.09425

