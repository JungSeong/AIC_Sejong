          pitch: 0.0
          yaw: 3.1415
        nic_rail_0:
          entity_present: true
          entity_name: "nic_card_0"
          entity_pose:
            translation: -0.0215
            roll: 0.0
            pitch: 0.0
            yaw: -0.1745
        nic_rail_1:
          entity_present: false
        nic_rail_2:
          entity_present: false
        nic_rail_3:
          entity_present: false
        nic_rail_4:
          entity_present: false
        sc_rail_0:
