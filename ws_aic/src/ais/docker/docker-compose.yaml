name: aic
services:
  eval:
    image: ghcr.io/intrinsic-dev/aic/aic_eval
    # image: my-eval:v1
    build:
      dockerfile: docker/aic_eval/Dockerfile
      context: ..
    command: gazebo_gui:=false launch_rviz:=false ground_truth:=false start_aic_engine:=true shutdown_on_aic_engine_exit:=true model_discovery_timeout_seconds:=600
    gpus: all
    networks:
      - default
    volumes:
      - /home/swlinux/aic_results/${RUN_TAG:-default}:/aic_results
    environment:
      AIC_EVAL_PASSWD: CHANGE_IN_PROD
      AIC_MODEL_PASSWD: CHANGE_IN_PROD
      # AIC_ENABLE_ACL: true
      AIC_RESULTS_DIR: /aic_results
  model:
    image: baseline:v1
    build:
      dockerfile: ws_aic/src/aic/docker/my_policy_node/Dockerfile
      context: ../../../..
    gpus: all
    networks:
      - default
    volumes:
      - /home/swlinux/aic_sejong/debug/yolo_detections:/debug/yolo_detections
    environment:
      RMW_IMPLEMENTATION: rmw_zenoh_cpp
      ZENOH_ROUTER_CHECK_ATTEMPTS: -1
      AIC_ROUTER_ADDR: eval:7447
      AIC_MODEL_PASSWD: CHANGE_IN_PROD
      # AIC_ENABLE_ACL: true
      AIC_DEBUG_SAVE_DIR: /debug/yolo_detections
networks:
  default:
    internal: true

