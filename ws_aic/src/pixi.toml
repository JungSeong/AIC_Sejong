[workspace]
name = "ws_aic"
authors = ["Teo Koon Peng <koonpeng@intrinsic.ai>"]
channels = ["robostack-kilted", "conda-forge"]
platforms = ["linux-64", "osx-arm64", "linux-aarch64"]
version = "0.1.0"
conda-pypi-map = { "robostack-kilted" = "aic/robostack_mapping.json" }
preview = ["pixi-build"]

[target.linux-64.dependencies]
evdev = ">=1.9.2,<2"

# ──────────────────────────────────────────
# conda 의존성
# ──────────────────────────────────────────
[dependencies]
isort = "==5.13.2"                                                                     # version bundled by the vscode extension
json5 = ">=0.13.0,<0.14"                                                               # version bundled by the vscode extension
numpy = "<2.3.0"
packaging = ">=24.2,<26.0"                                                             # required by lerobot==0.4.3
pyright = "==1.1.408"
setuptools = ">=71.0.0,<81.0.0"                                                        # required by lerobot==0.4.3
trimesh = ">=4.11.5,<5"
ultralytics = ">=8.4.39,<9"

# ROS
ros-kilted-rclpy = "*"
ros-kilted-rmw-zenoh-cpp = "*"
ros-kilted-ros-core = "*"
ros-kilted-control-msgs = "*"                                                          # lerobot_robot_ros
ros-kilted-geometry-msgs = "*"                                                         # lerobot_robot_ros
ros-kilted-moveit-msgs = "*"                                                           # lerobot_robot_ros
ros-kilted-sensor-msgs = "*"                                                           # lerobot_robot_ros
ros-kilted-std-msgs = "*"                                                              # lerobot_robot_ros
ros-kilted-std-srvs = "*"
ros-kilted-tf2-ros-py = "*"

# AIC 공식 패키지 (aic/)
ros-kilted-aic-control-interfaces = { path = "aic/aic_interfaces/aic_control_interfaces" }
ros-kilted-aic-example-policies   = { path = "aic/aic_example_policies" }
ros-kilted-aic-model              = { path = "aic/aic_model" }
ros-kilted-aic-model-interfaces   = { path = "aic/aic_interfaces/aic_model_interfaces" }
ros-kilted-aic-task-interfaces    = { path = "aic/aic_interfaces/aic_task_interfaces" }
ros-kilted-aic-teleoperation      = { path = "aic/aic_utils/aic_teleoperation" }
ros-kilted-lerobot-robot-aic      = { path = "aic/aic_utils/lerobot_robot_aic" }
ros-kilted-ais-stiffness-damping-calibration = { path = "ais/ais_stiffness_damping_calibration" }

# ais 스크립트 추가 의존성
opencv = "*"
pyyaml = "*"
scipy = "*"
tqdm = "*"
ros-kilted-plotjuggler-ros = ">=2.3.1,<3"

# ──────────────────────────────────────────
# PyPI 의존성
# ──────────────────────────────────────────
[pypi-dependencies]
torch = ">=2.0"
torchvision = ">=0.15"
huggingface-hub = { version = "~=1.7" }
lerobot = ">=0.5.1"
lerobot_robot_ros = { git = "https://github.com/koonpeng/lerobot-ros", rev = "87708d0ae14a724bca78f8ae9d55448332509a57", subdirectory = "lerobot_robot_ros" }
lerobot_teleoperator_devices = { git = "https://github.com/koonpeng/lerobot-ros", rev = "87708d0ae14a724bca78f8ae9d55448332509a57", subdirectory = "lerobot_teleoperator_devices" }
mujoco = "==3.5.0"
dm_control = "*"
pynput = ">=1.7.6,<2"
pyspacemouse = ">=2.0.0,<3"
transformers = ">=4.50.0"
diffusers = ">=0.33.0"
safetensors = "*"
draccus = "*"
transforms3d = "*"

# ais 로컬 패키지 (editable)
data-gen-node              = { path = "ais/ais_policy/data_gen_node",        editable = true }
motion-planning-node       = { path = "ais/ais_policy/motion_planning_node", editable = true }
distance-prediction-policy = { path = "ais/ais_policy/distance_prediction", editable = true }
policy-investigator        = { path = "ais/ais_policy/policy_investigator",  editable = true }
ais-reinforcement-learning = { path = "ais/ais_reinforcement_learning",      editable = true }

[activation]
scripts = ["aic/pixi_env_setup.sh"]

[pypi-options]
extra-index-urls = ["https://download.pytorch.org/whl/cu128"]
index-strategy = "unsafe-best-match"
dependency-overrides = { diffusers = ">=0.33.0" }
